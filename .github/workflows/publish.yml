name: Publish to JSR

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for JSR OIDC auth + provenance
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json
      - name: Install root tooling
        run: npm ci
      - name: Install Worker tooling
        working-directory: worker
        run: npm ci
      - name: Check, lint, and test Deno workspace
        run: |
          deno task fmt:check
          deno task lint
          deno task check
          deno task test
          deno publish --dry-run
      - name: Check and test Worker
        working-directory: worker
        run: |
          npm run check
          npm test
          npx wrangler deploy --dry-run
      - name: Publish workspace
        run: deno publish
