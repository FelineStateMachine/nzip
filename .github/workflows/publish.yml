name: Publish to JSR

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for JSR OIDC auth + provenance
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Publishes the whole workspace (@nzip/shared then @nzip/cli) at the
      # versions in their deno.json. No token needed — OIDC handles auth and
      # attaches build provenance.
      - name: Publish workspace
        run: deno publish
